<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Legends Poker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-title">
        <div class="app-title-line">Legends Poker</div>
        <div class="app-subtitle">Session tracker</div>
      </div>
      <div class="game-pill">
        <span>Current game:</span>
        <span id="game-id">—</span>
      </div>
    </header>

    <!-- Home Menu -->
    <div id="home" class="section active">
      <div class="menu">
        <button class="menu-btn" onclick="showSection('players')">
          <span class="menu-icon">👥</span>
          <span>Players</span>
        </button>
        <button class="menu-btn" onclick="showSection('game')">
          <span class="menu-icon">🎮</span>
          <span>Game</span>
        </button>
        <button class="menu-btn" onclick="showSection('history')">
          <span class="menu-icon">📜</span>
          <span>History</span>
        </button>
      </div>
    </div>

    <!-- Players Section -->
    <div id="players" class="section">
      <div class="back-link" onclick="showSection('home')">← Back</div>
      <div class="section-header">Players</div>
      <div class="add-form">
        <input type="text" id="new-player" class="add-input" placeholder="Player name">
        <button class="add-btn" onclick="addPlayer()">Add</button>
      </div>
      <div class="players-list" id="player-list"></div>
    </div>

    <!-- Game Section -->
    <div id="game" class="section">
      <div class="back-link" onclick="showSection('home')">← Back</div>

      <div id="game-start">
        <div class="section-header">Select players</div>
        <div id="player-select"></div>
        <div class="primary-actions">
          <button class="btn-primary" onclick="createGame()">Start Game</button>
        </div>
      </div>

      <div id="game-play" style="display:none;">
        <div class="section-header">Table</div>
        <div id="game-players"></div>

        <div class="totals-bar">
          <div class="totals-item">
            Buy-ins: <span id="total-buyins" class="totals-highlight">0 pots (0 chips)</span>
          </div>
          <div class="totals-item">
            Returns: <span id="total-returns" class="totals-highlight">0 chips ($0)</span>
          </div>
        </div>

        <div class="primary-actions">
          <button class="btn-primary" onclick="calculate()">Calculate Settlements</button>
          <button class="btn-secondary" onclick="showAddPlayerModal()">+ Add Player</button>
          <button class="btn-ghost" onclick="backToSelect()">← New Game</button>
        </div>

        <div id="settlements"></div>
      </div>

      <!-- Add Player Modal -->
      <div id="add-player-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:#16213e;padding:20px;border-radius:12px;width:90%;max-width:350px;">
          <h3 style="margin-bottom:15px;">Add Player to Game</h3>
          <div id="available-players"></div>
          <button class="btn-primary" onclick="addPlayersToGame()" style="width:100%;margin-top:15px;">Add Selected</button>
          <button class="btn-secondary" onclick="closeAddPlayerModal()" style="width:100%;margin-top:10px;">Cancel</button>
        </div>
      </div>
    </div>

    <!-- History Section -->
    <div id="history" class="section">
      <div class="back-link" onclick="showSection('home')">← Back</div>
      <div class="section-header">Recent games</div>
      <div id="history-list"></div>
    </div>
  </div>

  <script>
    let currentGameId = null;

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'players') loadPlayers();
      if (id === 'game') loadGame();
      if (id === 'history') loadHistory();
    }

    async function loadPlayers() {
      const players = await fetch('/api/players').then(r => r.json());
      document.getElementById('player-list').innerHTML = players.length
        ? players.map(p => `
          <div class="player-row">
            <div class="player-name">${p.name}</div>
            <div class="player-delete" onclick="deletePlayer(${p.id})">Delete</div>
          </div>
        `).join('')
        : '<div class="section-header" style="margin-top:4px;">No players yet</div>';
    }

    async function deletePlayer(id) {
      if (!confirm('Delete this player?')) return;
      await fetch('/api/players/' + id, { method: 'DELETE' });
      loadPlayers();
    }

    async function addPlayer() {
      const inp = document.getElementById('new-player');
      const name = inp.value.trim();
      if (!name) return;
      await fetch('/api/players', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name })
      });
      inp.value = '';
      loadPlayers();
    }

    async function loadGame() {
      document.getElementById('game-start').style.display = 'block';
      document.getElementById('game-play').style.display = 'none';
      document.getElementById('settlements').innerHTML = '';

      const players = await fetch('/api/players').then(r => r.json());
      document.getElementById('player-select').innerHTML = players.length
        ? players.map(p => `
          <div class="player-row">
            <div class="player-name">
              <input type="checkbox" id="p-${p.id}" value="${p.id}"> ${p.name}
            </div>
          </div>
        `).join('')
        : '<div class="section-header" style="margin-top:4px;">No players. Add players first!</div>';

      const games = await fetch('/api/games').then(r => r.json());
      if (!games.length) {
        document.getElementById('game-id').textContent = '—';
        return;
      }
      if (!currentGameId) {
        const latest = games[0]; // /api/games is ORDER BY id DESC
        currentGameId = latest.id;
      }
      await loadExistingGame();
    }

    async function loadExistingGame() {
      if (!currentGameId) return;

      document.getElementById('game-start').style.display = 'none';
      document.getElementById('game-play').style.display = 'block';

      const games = await fetch('/api/games').then(r => r.json());
      const thisGame = games.find(g => g.id === currentGameId);
      document.getElementById('game-id').textContent =
        thisGame ? thisGame.date : 'Game #' + currentGameId;

      const gameRes = await fetch(`/api/game/${currentGameId}`);
      const data = await gameRes.json();

      let totalBuyins = 0;
      let totalReturns = 0;

      document.getElementById('game-players').innerHTML = data.players.map(p => {
        const totalChips = p.buyins * 200;
        const chipsReturned = p.chips_returned || 0;
        const cashReturn = p.cash_return || 0;
        const net = (chipsReturned * 0.20) + cashReturn - (p.buyins * 40);

        totalBuyins += p.buyins;
        totalReturns += (chipsReturned * 0.20) + cashReturn;

        const badgeClass = net > 0 ? 'win' : net < 0 ? 'lose' : 'even';

        return `
          <div class="player-row">
            <div>
              <div class="player-name">${p.name}</div>
              <div class="player-meta">
                <div class="player-meta-line">
                  <span>Buy-ins</span><span>${p.buyins}</span>
                </div>
                <div class="player-meta-line">
                  <span>Chips back</span><span>${chipsReturned}</span>
                </div>
              </div>
            </div>
            <div class="player-right">
              <div class="net-badge ${badgeClass}">
                ${net > 0 ? '+' : ''}${Math.round(net)}
              </div>
              <div class="pot-buttons">
                <button class="btn-chip blue" onclick="quickAddBuyin(${p.buyin_id}, 1)">+1</button>
                <button class="btn-chip blue" onclick="quickAddBuyin(${p.buyin_id}, 2)">+2</button>
                <button class="btn-chip blue" onclick="quickAddBuyin(${p.buyin_id}, 3)">+3</button>
                <button class="btn-chip red" onclick="quickAddBuyin(${p.buyin_id}, -1)">-1</button>
                <button class="btn-chip red" onclick="quickAddBuyin(${p.buyin_id}, -2)">-2</button>
                <button class="btn-chip red" onclick="quickAddBuyin(${p.buyin_id}, -3)">-3</button>
              </div>
              <button class="btn-secondary"
                      style="margin-top:4px;font-size:11px;padding:4px 8px;"
                      onclick="editPlayer(${p.buyin_id})">
                Edit
              </button>
            </div>
          </div>
          <div class="edit-panel" id="edit-${p.buyin_id}" style="display:none;margin-bottom:8px;">
            <div style="margin-bottom:10px;">
              <div class="section-header" style="margin:4px 0;">Chips back</div>
              <div class="add-form">
                <button class="btn-secondary" onclick="updateChipsReturned(${p.buyin_id}, -50)">-50</button>
                <button class="btn-secondary" onclick="updateChipsReturned(${p.buyin_id}, -10)">-10</button>
                <input type="number" id="chips-${p.buyin_id}" class="add-input"
                       value="${chipsReturned}" onchange="saveChipsReturned(${p.buyin_id})">
                <button class="btn-secondary" onclick="updateChipsReturned(${p.buyin_id}, 10)">+10</button>
                <button class="btn-secondary" onclick="updateChipsReturned(${p.buyin_id}, 50)">+50</button>
              </div>
              <button class="btn-primary" style="margin-top:4px;"
                      onclick="saveChipsReturned(${p.buyin_id})">
                Save chips
              </button>
            </div>

            <div style="margin-bottom:10px;">
              <div class="section-header" style="margin:4px 0;">Return pots (200 chips)</div>
              <div class="add-form">
                <button class="btn-secondary" onclick="updateChipsReturned(${p.buyin_id}, 200)">+1</button>
                <button class="btn-secondary" onclick="updateChipsReturned(${p.buyin_id}, 400)">+2</button>
                <button class="btn-secondary" onclick="updateChipsReturned(${p.buyin_id}, 600)">+3</button>
                <button class="btn-secondary" onclick="updateChipsReturned(${p.buyin_id}, -200)">-1</button>
              </div>
            </div>

            <div>
              <div class="section-header" style="margin:4px 0;">Cash back</div>
              <div class="add-form">
                <button class="btn-secondary" onclick="updateCash(${p.buyin_id}, -20)">-20</button>
                <button class="btn-secondary" onclick="updateCash(${p.buyin_id}, -10)">-10</button>
                <input type="number" id="cash-${p.buyin_id}" class="add-input"
                       value="${cashReturn}" onchange="saveCash(${p.buyin_id})">
                <button class="btn-secondary" onclick="updateCash(${p.buyin_id}, 10)">+10</button>
                <button class="btn-secondary" onclick="updateCash(${p.buyin_id}, 20)">+20</button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      const totalChips = totalBuyins * 200;
      const returnChips = Math.floor(totalReturns / 0.20);
      document.getElementById('total-buyins').textContent =
        `${totalBuyins} pots (${totalChips} chips)`;

      const diff = returnChips - totalChips;
      if (diff > 0) {
        document.getElementById('total-returns').innerHTML =
          `⚠️ ${returnChips} chips ($${Math.round(totalReturns)}) - INFLATED +${diff}`;
      } else if (diff < 0) {
        document.getElementById('total-returns').innerHTML =
          `⚠️ ${returnChips} chips ($${Math.round(totalReturns)}) - SHORT ${Math.abs(diff)}`;
      } else {
        document.getElementById('total-returns').textContent =
          `${returnChips} chips ($${Math.round(totalReturns)}) - MATCH!`;
      }
    }

    async function createGame() {
      const checkboxes = document.querySelectorAll('#player-select input:checked');
      const playerIds = Array.from(checkboxes).map(c => parseInt(c.value, 10));

      if (!playerIds.length) {
        alert('Select at least one player!');
        return;
      }

      const res = await fetch('/api/game', { method: 'POST' });
      const data = await res.json();
      currentGameId = data.game_id;

      for (const playerId of playerIds) {
        await fetch(`/api/game/${currentGameId}/add_player`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ player_id: playerId, buyins: 1, chips_returned: 0 })
        });
      }

      await loadExistingGame();
    }

    async function backToSelect() {
      currentGameId = null;
      await loadGame();
    }

    async function quickAddBuyin(buyinId, amount) {
      const res = await fetch(`/api/game/${currentGameId}`);
      const data = await res.json();
      const player = data.players.find(p => p.buyin_id === buyinId);
      const currentBuyins = player ? player.buyins : 0;
      const newValue = currentBuyins + amount;
      if (newValue < 0) return;

      await fetch('/api/buyins', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ id: buyinId, field: 'buyins', value: newValue })
      });
      await loadExistingGame();
    }

    async function calculate() {
      const res = await fetch(`/api/calculate/${currentGameId}`);
      const data = await res.json();

      let html = '<div class="settlement-card">';
      data.results.forEach(r => {
        const cls = r.net_cash > 0 ? 'net-win' : r.net_cash < 0 ? 'net-lose' : 'net-even';
        html += `
          <div class="result-row">
            <div class="result-left">${r.name}: ${r.buyins} buy-ins, ${r.chips_returned || 0} back</div>
            <div class="result-right ${cls}">$${r.net_cash}</div>
          </div>
        `;
      });
      html += '<div class="settlement-list">';
      data.settlements.forEach(s => {
        html += `<div class="settlement-item">${s}</div>`;
      });
      html += '</div></div>';

      document.getElementById('settlements').innerHTML = html;
    }

    async function loadHistory() {
      const games = await fetch('/api/games').then(r => r.json());
      if (!games.length) {
        document.getElementById('history-list').innerHTML =
          '<div class="section-header" style="margin-top:4px;">No games yet</div>';
        return;
      }
      let html = '';
      for (const game of games.slice(0, 10)) {
        const res = await fetch(`/api/calculate/${game.id}`);
        const data = await res.json();
        html += `
          <div class="history-card">
            <div class="history-row">
              <span>${game.date}</span>
              <div class="history-actions">
                <span class="history-link" onclick="resumeGame(${game.id})">View</span>
                <span class="history-delete" onclick="deleteGame(${game.id})">Delete</span>
              </div>
            </div>
        `;
        if (data.settlements.length) {
          data.settlements.slice(0, 3).forEach(s => {
            html += `<div class="settlement-item">${s}</div>`;
          });
        }
        html += '</div>';
      }
      document.getElementById('history-list').innerHTML = html;
    }

    async function resumeGame(id) {
      currentGameId = id;
      showSection('game');
    }

    async function deleteGame(id) {
      if (!confirm('Delete this game?')) return;
      await fetch(`/api/game/${id}`, { method: 'DELETE' });
      if (currentGameId === id) currentGameId = null;
      await loadHistory();
    }

    function editPlayer(id) {
      document.querySelectorAll('.edit-panel').forEach(p => { p.style.display = 'none'; });
      const panel = document.getElementById(`edit-${id}`);
      if (panel) {
        panel.style.display = (panel.style.display === 'none' || !panel.style.display)
          ? 'block'
          : 'none';
      }
    }

    async function updateChipsReturned(buyinId, delta) {
      const input = document.getElementById(`chips-${buyinId}`);
      const current = parseInt(input.value || '0', 10);
      input.value = Math.max(0, current + delta);
      await saveChipsReturned(buyinId);
    }

    async function saveChipsReturned(buyinId) {
      const chips = parseInt(document.getElementById(`chips-${buyinId}`).value || '0', 10);
      await fetch('/api/buyins', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ id: buyinId, field: 'chips_returned', value: chips })
      });
      await loadExistingGame();
    }

    async function updateCash(buyinId, delta) {
      const input = document.getElementById(`cash-${buyinId}`);
      const current = parseInt(input.value || '0', 10);
      input.value = Math.max(0, current + delta);
      await saveCash(buyinId);
    }

    async function saveCash(buyinId) {
      const cash = parseInt(document.getElementById(`cash-${buyinId}`).value || '0', 10);
      await fetch('/api/buyins', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ id: buyinId, field: 'cash_return', value: cash })
      });
      await loadExistingGame();
    }
  </script>
</body>
</html>
