<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Legends Poker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; min-height: 100vh; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 32px; }
        
        .menu { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .menu-btn { 
            display: flex; align-items: center; gap: 15px;
            background: #252542; padding: 20px; border-radius: 12px;
            text-decoration: none; color: #fff; font-size: 20px; font-weight: 600;
            transition: transform 0.1s, background 0.2s;
        }
        .menu-btn:active { transform: scale(0.98); }
        .menu-btn:hover { background: #2d2d52; }
        .menu-icon { font-size: 32px; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .btn { padding: 12px 20px; border-radius: 8px; border: none; background: #0f3460; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #e94560; }
        .btn-small { padding: 8px 12px; font-size: 14px; }
        .btn-back { background: #444; margin-bottom: 15px; }
        
        .add-player { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #252542; color: #fff; font-size: 16px; }
        
        .player-list, .game-list { display: flex; flex-direction: column; gap: 10px; }
        .card { background: #252542; padding: 14px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .card-name { font-size: 18px; font-weight: 600; }
        
        .player-stats { display: flex; gap: 15px; }
        .stat { text-align: center; }
        .stat-label { font-size: 11px; color: #888; }
        .stat-value { font-size: 18px; font-weight: 700; color: #e94560; }
        
        .empty { text-align: center; color: #888; margin-top: 40px; }
        
        .edit-panel { display: none; background: #16213e; padding: 14px; border-radius: 10px; margin-top: 10px; }
        .edit-panel.show { display: block; }
        
        .buyin-btns { display: flex; gap: 8px; margin-top: 8px; }
        .buyin-btns button { flex: 1; padding: 10px; }
        
        .chips-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .chips-row button { width: 40px; height: 40px; padding: 0; }
        .chips-row input { width: 80px; text-align: center; }
        
        h2 { margin-bottom: 15px; color: #888; font-size: 14px; text-transform: uppercase; }
        
        .settlements { margin-top: 20px; }
        .settlement-card { background: #252542; padding: 12px; border-radius: 8px; margin-bottom: 8px; color: #4ade80; }
        .btn-delete { background: #dc2626; padding: 6px 10px; font-size: 12px; margin-left: 10px; }
        .delete-row { display: flex; align-items: center; }
        .player-check { display: flex; align-items: center; gap: 10px; padding: 10px; background: #252542; margin-bottom: 8px; border-radius: 8px; }
        .player-check input { width: 20px; height: 20px; }
        .player-check label { flex: 1; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🃏 Legends Poker</h1>
    
    <!-- Home Menu -->
    <div id="home" class="section active">
        <div class="menu">
            <a href="#" class="menu-btn" onclick="showSection('players')">
                <span class="menu-icon">👥</span>
                <span>Players</span>
            </a>
            <a href="#" class="menu-btn" onclick="showSection('game')">
                <span class="menu-icon">🎮</span>
                <span>Game</span>
            </a>
            <a href="#" class="menu-btn" onclick="showSection('history')">
                <span class="menu-icon">📜</span>
                <span>History</span>
            </a>
        </div>
    </div>
    
    <!-- Players Section -->
    <div id="players" class="section">
        <button class="btn btn-back" onclick="showSection('home')">← Back</button>
        <div class="add-player">
            <input type="text" id="new-player" placeholder="Player name">
            <button class="btn btn-primary" onclick="addPlayer()">Add</button>
        </div>
        <div class="player-list" id="player-list"></div>
    </div>
    
    <!-- Game Section -->
    <div id="game" class="section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <button class="btn btn-back" onclick="showSection('home')">← Back</button>
            <span id="game-id" style="color:#888;font-size:12px;"></span>
        </div>
        <div id="game-start">
            <h2>Select Players</h2>
            <div id="player-select"></div>
            <button class="btn btn-primary" onclick="createGame()" style="width:100%;margin-top:15px;">Start Game</button>
        </div>
        <div id="game-play" style="display:none;">
            <div id="game-players"></div>
            <div id="game-totals" style="background:#16213e;padding:15px;border-radius:10px;margin-top:15px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                    <span>Total Buy-ins:</span>
                    <span id="total-buyins" style="color:#e94560;font-weight:bold;">0 pots ($0)</span>
                </div>
                <div style="display:flex;justify-content:space-between;">
                    <span>Total Returns:</span>
                    <span id="total-returns" style="color:#4ade80;font-weight:bold;">0 pots ($0)</span>
                </div>
            </div>
            <button class="btn" onclick="calculate()" style="width:100%;margin-top:15px;background:#4ade80;color:#000;">Calculate Settlements</button>
            <button class="btn" onclick="showAddPlayerModal()" style="width:100%;margin-top:10px;background:#0f3460;">+ Add Player</button>
            <button class="btn" onclick="backToSelect()" style="width:100%;margin-top:10px;background:#444;">← New Game</button>
            <div id="settlements"></div>
        </div>
        
        <!-- Add Player Modal -->
        <div id="add-player-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
            <div style="background:#16213e;padding:20px;border-radius:12px;width:90%;max-width:350px;">
                <h3 style="margin-bottom:15px;">Add Player to Game</h3>
                <div id="available-players"></div>
                <button class="btn btn-primary" onclick="addPlayersToGame()" style="width:100%;margin-top:15px;">Add Selected</button>
                <button class="btn" onclick="closeAddPlayerModal()" style="width:100%;margin-top:10px;background:#444;">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- History Section -->
    <div id="history" class="section">
        <button class="btn btn-back" onclick="showSection('home')">← Back</button>
        <div id="history-list"></div>
    </div>
    
    <script>
        let currentGameId = null;
        
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'players') loadPlayers();
            if (id === 'game') loadGame();
            if (id === 'history') loadHistory();
        }
        
        async function loadPlayers() {
            const players = await fetch('/api/players').then(r => r.json());
            document.getElementById('player-list').innerHTML = players.length
                ? players.map(p => `
                <div class="card">
                    <div class="delete-row">
                        <span class="card-name">${p.name}</span>
                        <button class="btn btn-delete" onclick="deletePlayer(${p.id})">✕</button>
                    </div>
                </div>
            `).join('')
                : '<p class="empty">No players yet</p>';
        }
        
        async function deletePlayer(id) {
            if (!confirm('Delete this player?')) return;
            await fetch('/api/players/' + id, { method: 'DELETE' });
            loadPlayers();
        }
        
        async function addPlayer() {
            const name = document.getElementById('new-player').value.trim();
            if (!name) return;
            await fetch('/api/players', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name})
            });
            document.getElementById('new-player').value = '';
            loadPlayers();
        }
        
        async function loadGame() {
            // Default: show player selection
            document.getElementById('game-start').style.display = 'block';
            document.getElementById('game-play').style.display = 'none';
            document.getElementById('game-id').textContent = '';
            document.getElementById('settlements').innerHTML = '';

            const players = await fetch('/api/players').then(r => r.json());
            document.getElementById('player-select').innerHTML = players.length
                ? players.map(p => `
                <div class="player-check">
                    <input type="checkbox" id="p-${p.id}" value="${p.id}">
                    <label for="p-${p.id}">${p.name}</label>
                </div>
            `).join('')
                : '<p class="empty">No players. Add players first!</p>';
            
            // Try to restore an existing game
            const games = await fetch('/api/games').then(r => r.json());
            if (games.length === 0) return;

            if (!currentGameId) {
                // Use most recent game by id
                const latest = games[games.length - 1];
                currentGameId = latest.id;
            }

            await loadExistingGame();
        }
        
        async function loadExistingGame() {
            if (!currentGameId) return;
            document.getElementById('game-start').style.display = 'none';
            document.getElementById('game-play').style.display = 'block';
            
            const gamesRes = await fetch('/api/games');
            const games = await gamesRes.json();
            const thisGame = games.find(g => g.id === currentGameId);
            document.getElementById('game-id').textContent = thisGame ? thisGame.date : 'Game #' + currentGameId;
            
            const resCalc = await fetch(`/api/calculate/${currentGameId}`);
            const calcData = await resCalc.json();
            
            const gameRes = await fetch(`/api/game/${currentGameId}`);
            const data = await gameRes.json();
            
            let totalBuyins = 0;
            let totalReturns = 0;
            
            document.getElementById('game-players').innerHTML = data.players.map(p => {
                const totalChips = p.buyins * 200;
                const chipsReturned = p.chips_returned || 0;
                const chipsHeld = totalChips - chipsReturned;
                const cashReturn = p.cash_return || 0;
                const net = (chipsReturned * 0.20) + cashReturn - (p.buyins * 40);
                
                totalBuyins += p.buyins;
                totalReturns += (chipsReturned * 0.20) + cashReturn;
                
                return `
                <div class="card">
                    <span class="card-name">${p.name}</span>
                    <div class="player-stats">
                        <div class="stat">
                            <div class="stat-label">Buy-ins</div>
                            <div class="stat-value">${p.buyins}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Total</div>
                            <div class="stat-value">${totalChips}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Back</div>
                            <div class="stat-value" style="color:${chipsReturned >= totalChips ? '#4ade80' : '#dc2626'}">${chipsReturned}</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Net</div>
                            <div class="stat-value" style="color:${net >= 0 ? '#4ade80' : '#dc2626'}">$${Math.round(net)}</div>
                        </div>
                        <button class="btn btn-small" onclick="editPlayer(${p.buyin_id})">Edit</button>
                    </div>
                </div>
                <div style="display:flex;gap:5px;margin-bottom:10px;">
                    <button class="btn" style="flex:1;font-size:12px;padding:8px;" onclick="quickAddBuyin(${p.buyin_id}, 1)">+1</button>
                    <button class="btn" style="flex:1;font-size:12px;padding:8px;" onclick="quickAddBuyin(${p.buyin_id}, 2)">+2</button>
                    <button class="btn" style="flex:1;font-size:12px;padding:8px;" onclick="quickAddBuyin(${p.buyin_id}, 3)">+3</button>
                    <button class="btn" style="flex:1;font-size:12px;padding:8px;background:#dc2626;" onclick="quickAddBuyin(${p.buyin_id}, -1)">-1</button>
                    <button class="btn" style="flex:1;font-size:12px;padding:8px;background:#dc2626;" onclick="quickAddBuyin(${p.buyin_id}, -2)">-2</button>
                    <button class="btn" style="flex:1;font-size:12px;padding:8px;background:#dc2626;" onclick="quickAddBuyin(${p.buyin_id}, -3)">-3</button>
                </div>
                <div class="edit-panel" id="edit-${p.buyin_id}">
                    <div style="margin-bottom:15px;">
                        <div class="stat-label" style="margin-bottom:8px;">💰 BUY-IN (add $40 = 200 chips)</div>
                        <div class="buyin-btns">
                            <button class="btn" onclick="addBuyin(${p.buyin_id}, 1)">+1</button>
                            <button class="btn" onclick="addBuyin(${p.buyin_id}, 2)">+2</button>
                            <button class="btn" onclick="addBuyin(${p.buyin_id}, 3)">+3</button>
                        </div>
                    </div>
                    <div style="margin-bottom:15px;">
                        <div class="stat-label" style="margin-bottom:8px;">🎫 CHIPS BACK (enter chips returned)</div>
                        <div class="chips-row">
                            <button class="btn" onclick="updateChipsReturned(${p.buyin_id}, -50)">-50</button>
                            <button class="btn" onclick="updateChipsReturned(${p.buyin_id}, -10)">-10</button>
                            <input type="number" id="chips-${p.buyin_id}" value="${chipsReturned}" onchange="saveChipsReturned(${p.buyin_id})">
                            <button class="btn" onclick="updateChipsReturned(${p.buyin_id}, 10)">+10</button>
                            <button class="btn" onclick="updateChipsReturned(${p.buyin_id}, 50)">+50</button>
                        </div>
                        <button class="btn" style="width:100%;margin-top:5px;" onclick="saveChipsReturned(${p.buyin_id})">Save Chips</button>
                    </div>
                    <div style="margin-bottom:15px;">
                        <div class="stat-label" style="margin-bottom:8px;">🎯 RETURN POTS (1 pot = 200 chips)</div>
                        <div class="buyin-btns">
                            <button class="btn" onclick="updateChipsReturned(${p.buyin_id}, 200)">+1</button>
                            <button class="btn" onclick="updateChipsReturned(${p.buyin_id}, 400)">+2</button>
                            <button class="btn" onclick="updateChipsReturned(${p.buyin_id}, 600)">+3</button>
                            <button class="btn" style="background:#dc2626" onclick="updateChipsReturned(${p.buyin_id}, -200)">-1</button>
                        </div>
                    </div>
                    <div>
                        <div class="stat-label" style="margin-bottom:8px;">💵 CASH BACK (direct cash)</div>
                        <div class="chips-row">
                            <button class="btn" onclick="updateCash(${p.buyin_id}, -20)">-$20</button>
                            <button class="btn" onclick="updateCash(${p.buyin_id}, -10)">-$10</button>
                            <input type="number" id="cash-${p.buyin_id}" value="${p.cash_return || 0}" onchange="saveCash(${p.buyin_id})">
                            <button class="btn" onclick="updateCash(${p.buyin_id}, 10)">+$10</button>
                            <button class="btn" onclick="updateCash(${p.buyin_id}, 20)">+$20</button>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
            
            const totalPots = totalBuyins;
            const totalChips = totalPots * 200;
            const returnValue = totalReturns;
            const returnChips = Math.floor(returnValue / 0.20);
            
            document.getElementById('total-buyins').textContent = `${totalPots} pots (${totalChips} chips)`;
            
            const diff = returnChips - totalChips;
            if (diff > 0) {
                document.getElementById('total-returns').innerHTML = `<span style="color:#dc2626">⚠️ ${returnChips} chips ($${Math.round(returnValue)}) - INFLATED +${diff}</span>`;
            } else if (diff < 0) {
                document.getElementById('total-returns').innerHTML = `<span style="color:#fbbf24">⚠️ ${returnChips} chips ($${Math.round(returnValue)}) - SHORT ${Math.abs(diff)}</span>`;
            } else {
                document.getElementById('total-returns').textContent = `${returnChips} chips ($${Math.round(returnValue)}) - MATCH!`;
            }
        }
        
        async function createGame() {
            const checkboxes = document.querySelectorAll('#player-select input:checked');
            const playerIds = Array.from(checkboxes).map(c => parseInt(c.value));
            
            if (playerIds.length === 0) {
                alert('Select at least one player!');
                return;
            }
            
            const res = await fetch('/api/game', { method: 'POST' });
            const data = await res.json();
            currentGameId = data.game_id;
            
            for (const playerId of playerIds) {
                await fetch('/api/game/' + currentGameId + '/add_player', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({player_id: playerId, buyins: 1, chips: 0})
                });
            }
            
            await loadExistingGame();
        }
        
        async function backToSelect() {
            currentGameId = null;
            await loadGame();
        }
        
        function editPlayer(id) {
            document.querySelectorAll('.edit-panel').forEach(p => p.classList.remove('show'));
            const panel = document.getElementById(`edit-${id}`);
            if (panel) {
                panel.classList.toggle('show');
            }
        }
        
        async function addBuyin(buyinId, amount) {
            await fetch('/api/buyins', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: buyinId, buyins: amount, chips_returned: 0 })
            });
            await loadExistingGame();
        }
        
        async function quickAddBuyin(buyinId, amount) {
            const res = await fetch(`/api/game/${currentGameId}`);
            const data = await res.json();
            const player = data.players.find(p => p.buyin_id === buyinId);
            const currentBuyins = player ? player.buyins : 0;
            const newValue = currentBuyins + amount;
            if (newValue < 0) return;
            
            await fetch('/api/buyins', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: buyinId, field: 'buyins', value: newValue })
            });
            await loadExistingGame();
        }
        
        async function updateChipsReturned(buyinId, delta) {
            const input = document.getElementById(`chips-${buyinId}`);
            input.value = Math.max(0, parseInt(input.value || '0') + delta);
            await saveChipsReturned(buyinId);
        }
        
        async function saveChipsReturned(buyinId) {
            const chips = parseInt(document.getElementById(`chips-${buyinId}`).value || '0');
            await fetch('/api/buyins', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: buyinId, field: 'chips_returned', value: chips })
            });
            await loadExistingGame();
        }
        
        async function updateCash(buyinId, delta) {
            const input = document.getElementById(`cash-${buyinId}`);
            input.value = Math.max(0, parseInt(input.value || '0') + delta);
            await saveCash(buyinId);
        }
        
        async function saveCash(buyinId) {
            const cash = parseInt(document.getElementById(`cash-${buyinId}`).value || '0');
            await fetch('/api/buyins', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: buyinId, field: 'cash_return', value: cash })
            });
            await loadExistingGame();
        }
        
        async function calculate() {
            const res = await fetch(`/api/calculate/${currentGameId}`);
            const data = await res.json();
            
            let html = '<div class="settlements">';
            data.results.forEach(r => {
                html += `<div class="card"><b>${r.name}</b>: ${r.buyins} buy-ins, ${r.chips_returned || 0} back → <span style="color:#4ade80">$${r.net_cash}</span></div>`;
            });
            html += '<h2>Settlements</h2>';
            data.settlements.forEach(s => {
                html += `<div class="settlement-card">${s}</div>`;
            });
            html += '</div>';
            document.getElementById('settlements').innerHTML = html;
        }
        
        async function loadHistory() {
            const games = await fetch('/api/games').then(r => r.json());
            if (games.length === 0) {
                document.getElementById('history-list').innerHTML = '<p class="empty">No games yet</p>';
                return;
            }
            
            let html = '';
            for (const game of games.slice(0, 10)) {
                const res = await fetch(`/api/calculate/${game.id}`);
                const data = await res.json();
                html += `<div class="card">
                    <div class="delete-row">
                        <b>${game.date}</b>
                        <button class="btn btn-delete" onclick="deleteGame(${game.id})">✕</button>
                    </div>
                </div>`;
                if (data.settlements.length > 0) {
                    data.settlements.slice(0,3).forEach(s => {
                        html += `<div class="settlement-card">${s}</div>`;
                    });
                }
            }
            document.getElementById('history-list').innerHTML = html || '<p class="empty">No completed games</p>';
        }
        
        async function deleteGame(id) {
            if (!confirm('Delete this game?')) return;
            await fetch('/api/game/' + id, { method: 'DELETE' });
            if (currentGameId === id) currentGameId = null;
            await loadHistory();
        }
        
        async function showAddPlayerModal() {
            if (!currentGameId) return;
            const modal = document.getElementById('add-player-modal');
            modal.style.display = 'flex';
            
            const allPlayers = await fetch('/api/players').then(r => r.json());
            const gameRes = await fetch(`/api/game/${currentGameId}`);
            const gameData = await gameRes.json();
            const currentPlayerIds = gameData.players.map(p => p.player_id);
            const availablePlayers = allPlayers.filter(p => !currentPlayerIds.includes(p.id));
            
            document.getElementById('available-players').innerHTML = availablePlayers.length
                ? availablePlayers.map(p => `
                <div class="player-check" style="margin-bottom:10px;">
                    <input type="checkbox" id="add-p-${p.id}" value="${p.id}">
                    <label for="add-p-${p.id}">${p.name}</label>
                </div>
            `).join('')
                : '<p>No players available</p>';
        }
        
        function closeAddPlayerModal() {
            document.getElementById('add-player-modal').style.display = 'none';
        }
        
        async function addPlayersToGame() {
            const checkboxes = document.querySelectorAll('#available-players input:checked');
            const playerIds = Array.from(checkboxes).map(c => parseInt(c.value));
            if (playerIds.length === 0) {
                closeAddPlayerModal();
                return;
            }
            
            for (const playerId of playerIds) {
                await fetch('/api/game/' + currentGameId + '/add_player', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({player_id: playerId, buyins: 1, chips_returned: 0})
                });
            }
            
            closeAddPlayerModal();
            await loadExistingGame();
        }
    </script>
</body>
</html>
