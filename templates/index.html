<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Legends Poker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050814;
      --bg-elevated: #101628;
      --bg-elevated-soft: #181f33;
      --accent: #1dd1a1;
      --accent-soft: #1dd1a11a;
      --danger: #ff6b6b;
      --danger-soft: #ff6b6b1a;
      --text: #f5f7ff;
      --text-muted: #8c96b8;
      --border-subtle: #262c3f;
      --chip-blue: #0f5fd3;
      --chip-red: #c0392b;
      --radius-lg: 14px;
      --radius-md: 10px;
      --radius-sm: 6px;
      --shadow-soft: 0 14px 35px rgba(0, 0, 0, 0.45);
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--font-main);
      background: radial-gradient(circle at top, #1b2342 0, #050814 55%);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 12px 40px;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      margin-bottom: 10px;
      border-radius: var(--radius-lg);
      background: linear-gradient(120deg, #151c33, #11182b);
      box-shadow: var(--shadow-soft);
    }

    .app-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-title-line {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .app-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    .game-pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: #0b1221;
      border: 1px solid var(--border-subtle);
      font-size: 11px;
      color: var(--text-muted);
    }

    .section-header {
      margin: 18px 4px 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .player-row {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.6fr) minmax(0, 1.1fr);
      gap: 8px;
      align-items: center;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: var(--radius-lg);
      background: var(--bg-elevated-soft);
      border: 1px solid var(--border-subtle);
    }

    .player-name {
      font-weight: 600;
      font-size: 14px;
    }

    .player-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .player-meta-line {
      display: flex;
      justify-content: space-between;
    }

    .player-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .net-badge {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .net-badge.win {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .net-badge.lose {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .net-badge.even {
      background: #1f263e;
      color: #c0c5dd;
    }

    .pot-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 4px;
    }

    .btn-chip {
      min-width: 32px;
      padding: 4px 0;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 11px;
      font-weight: 600;
      color: #f7fbff;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }

    .btn-chip.blue {
      background: var(--chip-blue);
    }

    .btn-chip.red {
      background: var(--chip-red);
    }

    .btn-chip:active {
      transform: translateY(1px) scale(0.97);
      filter: brightness(0.92);
    }

    .totals-bar {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0 16px;
      padding: 8px 10px;
      border-radius: var(--radius-md);
      background: #0b1221;
      border: 1px solid var(--border-subtle);
      font-size: 11px;
    }

    .totals-item {
      color: var(--text-muted);
    }

    .totals-highlight {
      font-weight: 600;
      color: var(--accent);
    }

    .primary-actions {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .btn-primary,
    .btn-secondary,
    .btn-ghost {
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #02120c;
    }

    .btn-secondary {
      background: #252f4a;
      color: var(--text);
    }

    .btn-ghost {
      background: transparent;
      border: 1px dashed var(--border-subtle);
      color: var(--text-muted);
    }

    .btn-primary:active,
    .btn-secondary:active,
    .btn-ghost:active {
      transform: translateY(1px) scale(0.98);
      filter: brightness(0.95);
    }

    .settlement-card {
      margin-top: 16px;
      border-radius: var(--radius-lg);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      padding: 10px 10px 4px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 4px 0;
      color: #9ba3c2;
    }

    .result-left {
      flex: 1;
      padding-right: 8px;
    }

    .result-right {
      min-width: 60px;
      text-align: right;
      font-weight: 600;
    }

    .result-right.net-win {
      color: var(--accent);
    }

    .result-right.net-lose {
      color: var(--danger);
    }

    .result-right.net-even {
      color: #c0c5dd;
    }

    .settlement-list {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #252c40;
    }

    .settlement-item {
      font-size: 12px;
      padding: 4px 0;
      color: var(--accent);
    }

    .history-card {
      margin-top: 16px;
      border-radius: var(--radius-lg);
      background: var(--bg-elevated-soft);
      border: 1px solid var(--border-subtle);
      padding: 10px;
      font-size: 12px;
    }

    .history-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #252c40;
    }

    .history-row:last-child {
      border-bottom: none;
    }

    .history-actions {
      display: flex;
      gap: 6px;
      font-size: 11px;
    }

    .history-link {
      color: var(--accent);
      cursor: pointer;
    }

    .history-delete {
      color: var(--danger);
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .player-row {
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.6fr);
        grid-template-rows: auto auto;
      }
      .player-right {
        grid-column: 1 / -1;
        flex-direction: row;
        justify-content: space-between;
        margin-top: 4px;
      }

      .app-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-title">
        <div class="app-title-line">Legends Poker</div>
        <div class="app-subtitle">Session tracker</div>
      </div>
      <div id="game-pill" class="game-pill">
        Current game: —
      </div>
    </header>

    <!-- Players selection -->
    <div class="section-header">Players</div>
    <div id="player-select-container"></div>
    <div class="primary-actions" style="margin-top: 6px;">
      <button id="btn-new-game" class="btn-ghost">← New Game</button>
      <button id="btn-start-game" class="btn-secondary">Start Game</button>
      <button id="btn-manage-players" class="btn-secondary">
        Manage Players
      </button>
    </div>

    <!-- Game table -->
    <div class="section-header">Table</div>
    <div id="game-players"></div>

    <div class="totals-bar">
      <div class="totals-item" id="total-buyins">Total Buy-ins: —</div>
      <div class="totals-item totals-highlight" id="total-returns">
        Total Returns: —
      </div>
    </div>

    <div class="primary-actions">
      <button id="btn-calc" class="btn-primary">Calculate Settlements</button>
      <button id="btn-add-player" class="btn-secondary">+ Add Player</button>
    </div>

    <!-- Settlements -->
    <div id="settlements-card" class="settlement-card" style="display:none;">
      <div class="section-header">Results</div>
      <div id="results-summary"></div>
      <div class="settlement-list" id="settlement-lines"></div>
    </div>

    <!-- History -->
    <div class="section-header">History</div>
    <div id="history" class="history-card"></div>
  </div>

  <script>
    let players = [];
    let currentGameId = null;
    let currentGameDate = null;

    async function fetchPlayers() {
      const res = await fetch("/api/players");
      players = await res.json();
      renderPlayerSelect();
    }

    function renderPlayerSelect() {
      const container = document.getElementById("player-select-container");
      container.innerHTML = "";
      players.forEach((p) => {
        const div = document.createElement("div");
        div.style.display = "flex";
        div.style.justifyContent = "space-between";
        div.style.alignItems = "center";
        div.style.padding = "6px 8px";
        div.style.marginBottom = "4px";
        div.style.borderRadius = "10px";
        div.style.background = "#101628";
        div.style.border = "1px solid #262c3f";

        const left = document.createElement("span");
        left.textContent = p.name;

        const right = document.createElement("span");
        right.style.fontSize = "11px";
        right.style.color = "#8c96b8";
        right.textContent = "Tap in game to add buy-ins";

        div.appendChild(left);
        div.appendChild(right);
        container.appendChild(div);
      });
    }

    function updateGamePill() {
      const pill = document.getElementById("game-pill");
      if (currentGameId && currentGameDate) {
        pill.textContent = `Game ${currentGameDate} · #${currentGameId}`;
      } else {
        pill.textContent = "Current game: —";
      }
    }

    function renderGamePlayers(gamePlayers) {
      const container = document.getElementById("game-players");
      container.innerHTML = "";

      let totalBuyins = 0;
      let totalReturnedChips = 0;

      gamePlayers.forEach((p) => {
        totalBuyins += p.buyins;
        totalReturnedChips += p.chips_returned;

        const net = p.net_cash ?? 0;
        const netClass =
          net > 0 ? "win" : net < 0 ? "lose" : "even";
        const sign = net > 0 ? "+" : "";

        const row = document.createElement("div");
        row.className = "player-row";

        row.innerHTML = `
          <div class="player-name">${p.name}</div>
          <div class="player-meta">
            <div class="player-meta-line">
              <span>Buy-ins</span>
              <span>${p.buyins}</span>
            </div>
            <div class="player-meta-line">
              <span>Back</span>
              <span>${p.chips_returned}</span>
            </div>
            <div class="player-meta-line">
              <span>Cash</span>
              <span>$${p.cash_return || 0}</span>
            </div>
          </div>
          <div class="player-right">
            <div class="net-badge net-${netClass}">
              Net ${sign}$${net}
            </div>
            <div class="pot-buttons" data-buyin-id="${p.buyin_id}">
              <button class="btn-chip blue" data-delta="1">+1</button>
              <button class="btn-chip blue" data-delta="2">+2</button>
              <button class="btn-chip blue" data-delta="3">+3</button>
              <button class="btn-chip red" data-delta="-1">-1</button>
              <button class="btn-chip red" data-delta="-2">-2</button>
              <button class="btn-chip red" data-delta="-3">-3</button>
            </div>
          </div>
        `;

        container.appendChild(row);
      });

      document.getElementById(
        "total-buyins"
      ).textContent = `Total Buy-ins: ${totalBuyins} pots (${totalBuyins * 200} chips)`;

      document.getElementById(
        "total-returns"
      ).textContent = `Total Returns: ${totalReturnedChips} chips ($${
        (totalReturnedChips * 0.2).toFixed(0)
      })`;
    }

    async function loadHistory() {
      const res = await fetch("/api/games");
      const games = await res.json();
      const historyDiv = document.getElementById("history");
      historyDiv.innerHTML = "";

      if (!games.length) {
        historyDiv.textContent = "No games yet.";
        return;
      }

      games.slice(0, 10).forEach((g) => {
        const row = document.createElement("div");
        row.className = "history-row";

        const left = document.createElement("div");
        left.textContent = g.date;

        const right = document.createElement("div");
        right.className = "history-actions";
        const view = document.createElement("span");
        view.className = "history-link";
        view.textContent = "View";
        view.onclick = () => loadGame(g.id, g.date);

        const del = document.createElement("span");
        del.className = "history-delete";
        del.textContent = "Delete";
        del.onclick = () => deleteGame(g.id);

        right.appendChild(view);
        right.appendChild(del);

        row.appendChild(left);
        row.appendChild(right);

        historyDiv.appendChild(row);
      });
    }

    async function deleteGame(id) {
      if (!confirm("Delete this game?")) return;
      await fetch(`/api/game/${id}`, { method: "DELETE" });
      if (currentGameId === id) {
        currentGameId = null;
        currentGameDate = null;
        updateGamePill();
        document.getElementById("game-players").innerHTML = "";
        document.getElementById("total-buyins").textContent =
          "Total Buy-ins: —";
        document.getElementById("total-returns").textContent =
          "Total Returns: —";
        document.getElementById("settlements-card").style.display = "none";
      }
      loadHistory();
    }

    async function createGame() {
      const res = await fetch("/api/game", { method: "POST" });
      const data = await res.json();
      currentGameId = data.game_id;
      currentGameDate = new Date().toLocaleString();
      updateGamePill();
      localStorage.setItem("currentGameId", String(currentGameId));
      await loadGame(currentGameId, currentGameDate);
      loadHistory();
    }

    async function loadGame(id, dateLabel) {
      currentGameId = id;
      currentGameDate = dateLabel || currentGameDate;
      updateGamePill();

      const res = await fetch(`/api/game/${id}`);
      const data = await res.json();

      // For now, these don't include net_cash; it's added by /api/calculate
      const gamePlayers = data.players.map((p) => ({
        ...p,
        net_cash: 0,
      }));

      renderGamePlayers(gamePlayers);
    }

    async function calculateSettlements() {
      if (!currentGameId) return;
      const res = await fetch(`/api/calculate/${currentGameId}`);
      const data = await res.json();

      const gamePlayers = data.results.map((r) => ({
        name: r.name,
        buyins: r.buyins,
        chips_returned: r.chips_returned,
        cash_return: r.cash_return,
        buyin_id: null,
        net_cash: r.net_cash,
      }));

      renderGamePlayers(gamePlayers);

      const summary = document.getElementById("results-summary");
      summary.innerHTML = "";
      data.results.forEach((r) => {
        const row = document.createElement("div");
        row.className = "result-row";

        const sign = r.net_cash > 0 ? "+" : "";
        const netClass =
          r.net_cash > 0 ? "net-win" : r.net_cash < 0 ? "net-lose" : "net-even";

        row.innerHTML = `
          <div class="result-left">
            ${r.name} : ${r.buyins} buy-ins, ${r.chips_returned} back →
          </div>
          <div class="result-right ${netClass}">
            ${sign}$${r.net_cash}
          </div>
        `;
        summary.appendChild(row);
      });

      const lines = document.getElementById("settlement-lines");
      lines.innerHTML = data.settlements
        .map((s) => `<div class="settlement-item">${s}</div>`)
        .join("");

      document.getElementById("settlements-card").style.display = "block";
    }

    async function adjustBuyins(buyinId, delta) {
      const res = await fetch("/api/buyins", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id: buyinId,
          buyins: delta > 0 ? delta : 0,
          chips_returned: delta < 0 ? Math.abs(delta) * 200 : 0,
        }),
      });
      if (res.ok && currentGameId) {
        await loadGame(currentGameId, currentGameDate);
      }
    }

    function wireEvents() {
      document
        .getElementById("btn-new-game")
        .addEventListener("click", createGame);

      document
        .getElementById("btn-calc")
        .addEventListener("click", calculateSettlements);

      document
        .getElementById("btn-add-player")
        .addEventListener("click", () => {
          window.location.href = "/players";
        });

      document
        .getElementById("btn-manage-players")
        .addEventListener("click", () => {
          window.location.href = "/players";
        });

      document
        .getElementById("game-players")
        .addEventListener("click", (e) => {
          const btn = e.target.closest(".btn-chip");
          if (!btn) return;
          const delta = parseInt(btn.dataset.delta, 10);
          const potDiv = btn.closest(".pot-buttons");
          const buyinId = parseInt(potDiv.dataset.buyinId, 10);
          if (!isNaN(delta) && buyinId) {
            adjustBuyins(buyinId, delta);
          }
        });
    }

    async function init() {
      wireEvents();
      await fetchPlayers();
      await loadHistory();

      const stored = localStorage.getItem("currentGameId");
      if (stored) {
        currentGameId = parseInt(stored, 10);
        if (!isNaN(currentGameId)) {
          await loadGame(currentGameId);
        }
      }
    }

    init();
  </script>
</body>
</html>
